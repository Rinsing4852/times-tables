services:
  times-tables-backend:
    build:
      context: ./backend
    container_name: times-tables-backend
    restart: unless-stopped
    init: true
    user: "1000:1000"
    environment:
      DATABASE_URL: sqlite:////data/recall_forge.db
    volumes:
      - ${TIMES_TABLES_DATA_DIR:-/mnt/user/appdata/times-tables/data}:/data
    networks:
      - times-tables-net
    read_only: true
    tmpfs:
      - /tmp
    mem_limit: 256m
    cpus: 0.50
    pids_limit: 128
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  times-tables-frontend:
    build:
      context: ./frontend
    container_name: times-tables-frontend
    restart: unless-stopped
    init: true
    environment:
      BACKEND_INTERNAL_URL: http://times-tables-backend:8000
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "${UNRAID_LAN_IP:-192.168.1.50}:${RECALL_FORGE_PORT:-3000}:3000"
    depends_on:
      times-tables-backend:
        condition: service_healthy
    networks:
      - times-tables-net
    read_only: true
    tmpfs:
      - /tmp
      - /app/.next/cache
    mem_limit: 256m
    cpus: 0.50
    pids_limit: 128
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const os=require('os'); fetch('http://' + os.hostname() + ':3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  times-tables-net:
    driver: bridge
