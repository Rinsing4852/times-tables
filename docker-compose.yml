services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: sqlite:////data/recall_forge.db
    volumes:
      - backend-data:/data

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      BACKEND_INTERNAL_URL: http://backend:8000
      NEXT_TELEMETRY_DISABLED: "1"
    depends_on:
      - backend

volumes:
  backend-data:
